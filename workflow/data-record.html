<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>数据记录 | 阿简成长实验室</title><link rel="stylesheet" href="../styles.css"/></head><body><header class="site-header"><a class="brand" href="../index.html"><span class="brand-mark">AJ</span>阿简成长实验室</a><nav class="nav"><a href="../index.html">首页</a><a href="../projects.html">我的项目</a><a href="../archive.html">成长档案</a><a href="../experiments.html">实验库</a><a href="../whitepapers.html">成长白皮书</a><a href="../handoffs.html">项目交接卡</a><a href="../contact.html">联系我</a></nav></header><main><article class="article"><div class="breadcrumb"><a href="../index.html">返回首页</a></div><div class="article-shell"><p class="eyebrow">Workflow / Step 01</p><h1>数据记录</h1><p>记录睡眠、健康、运营样本、沟通结果和当天状态，让成长有原始数据可追溯。</p><h2>记录什么</h2><ul><li>身体状态：睡眠、眼睛、运动、精神。</li><li>工作状态：运营动作、账号反馈、沟通结果。</li><li>学习状态：今天吸收了什么、产出了什么。</li></ul><h2>意义</h2><p>没有记录，就只能靠感觉判断；有了记录，才有复盘和优化的基础。</p></div></article></main><footer class="footer"><p>© <span id="year"></span> 阿简成长实验室.</p><button class="top-button" type="button">↑</button></footer><script src="../script.js"></script></body></html>
